services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/backend_data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      FRONTEND_BACKEND_URL: http://backend:8000
    ports:
      - "7860:7860"

volumes:
  backend_data:
